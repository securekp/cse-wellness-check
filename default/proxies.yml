# External API declaration. Declare domains your app needs to reach.
# At install time, admins see exactly which endpoints the app will use.

# Cribl release feed — used by the "latest version" check to compare the
# deployment version against the current GA release. Read-only, no auth.
cdn.cribl.io:
  paths:
    allowlist:
      - /dl/latest-version
  timeout: 10000

